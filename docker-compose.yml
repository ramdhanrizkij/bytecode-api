services:
  postgres:
    image: postgres:17-alpine
    container_name: bytecode-api-db
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_NAME:-bytecode_api}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-bytecode_api}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
