info:
  contact:
    email: support@example.com
    name: Bytecode API Support
  description: REST API for authentication, users, roles, permissions, RBAC, storage-backed
    profiles, and worker-enabled background tasks.
  license:
    name: MIT
  termsOfService: http://swagger.io/terms/
  title: Bytecode API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns access and refresh tokens.
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_ramdhanrizkij_bytecode-api_internal_features_auth_domain.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/swaggerdocs.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/swaggerdocs.ValidationErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
      summary: Login
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes a refresh token.
      parameters:
      - description: Logout payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_ramdhanrizkij_bytecode-api_internal_features_auth_domain.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/swaggerdocs.ValidationErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
      summary: Logout
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a valid refresh token for a new token pair.
      parameters:
      - description: Refresh token payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_ramdhanrizkij_bytecode-api_internal_features_auth_domain.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/swaggerdocs.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/swaggerdocs.ValidationErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a user account and returns access and refresh tokens.
      parameters:
      - description: Registration payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_ramdhanrizkij_bytecode-api_internal_features_auth_domain.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/swaggerdocs.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/swaggerdocs.ValidationErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /health:
    get:
      description: Returns the current health state for the API, database, cache,
        and storage provider.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/swaggerdocs.HealthResponse'
      summary: Check service health
      tags:
      - Health
  /permissions/:
    get:
      description: Returns paginated permissions.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: per_page
        type: integer
      - default: created_at
        description: Sort field
        in: query
        name: sort
        type: string
      - default: desc
        description: Sort direction
        enum:
        - asc
        - desc
        in: query
        name: order
        type: string
      - description: Search keyword
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/swaggerdocs.PermissionListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List permissions
      tags:
      - Permissions
    post:
      consumes:
      - application/json
      description: Creates a new permission.
      parameters:
      - description: Permission payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_ramdhanrizkij_bytecode-api_internal_features_permission_domain.CreatePermissionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/swaggerdocs.PermissionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/swaggerdocs.ValidationErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create permission
      tags:
      - Permissions
  /permissions/{id}:
    delete:
      description: Deletes a permission by UUID.
      parameters:
      - description: Permission UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete permission
      tags:
      - Permissions
    get:
      description: Returns one permission by UUID.
      parameters:
      - description: Permission UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/swaggerdocs.PermissionResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/swaggerdocs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get permission by ID
      tags:
      - Permissions
    put:
      consumes:
      - application/json
      description: Updates an existing permission by UUID.
      parameters:
      - description: Permission UUID
        in: path
        name: id
        required: true
        type: string
      - description: Permission payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_ramdhanrizkij_bytecode-api_internal_features_permission_domain.UpdatePermissionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/swaggerdocs.PermissionResponse'
        "400":
          description: Bad Request
